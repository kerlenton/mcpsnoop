# GoReleaser v2 — on a pushed tag, cross-compiles the binaries, builds the
# archives and checksums, and publishes a GitHub Release with a generated
# changelog. Run locally: goreleaser release --snapshot --clean
version: 2

project_name: mcpsnoop

before:
  hooks:
    - go mod tidy

builds:
  - id: mcpsnoop
    main: ./cmd/mcpsnoop
    binary: mcpsnoop
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

# Publish a Homebrew formula to the kerlenton/homebrew-mcpsnoop tap on each
# release. Needs HOMEBREW_TAP_TOKEN (a PAT that can push to that tap repo).
brews:
  - name: mcpsnoop
    repository:
      owner: kerlenton
      name: homebrew-mcpsnoop
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/kerlenton/mcpsnoop"
    description: "Wireshark for MCP: a transparent proxy and TUI for debugging MCP traffic"
    license: "MIT"
    commit_author:
      name: goreleaser
      email: noreply@github.com
    test: |
      system "#{bin}/mcpsnoop", "version"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Use GitHub's own release-notes generator: each entry is the PR title, linked,
# credited to its author (by @user in #N) — instead of a raw commit + email dump.
changelog:
  use: github-native
